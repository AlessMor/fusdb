# to generate the site:
# pip install -e .[docs]
# mkdocs serve -f docs/mkdocs.yml
# Then open: http://127.0.0.1:8000


site_name: fusdb
site_description: Fusion reactor scenario database, physics relations, and solver documentation
site_url: https://alessmor.github.io/fusdb/
docs_dir: .
site_dir: ../site
repo_url: https://github.com/AlessMor/fusdb
repo_name: AlessMor/fusdb

exclude_docs: |
  /_private/
  /hooks/
  /scripts/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: amber

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true
  - gen-files:
      scripts:
        - scripts/build_docs_assets.py
  - mkdocstrings:
      handlers:
        python:
          paths:
            - ../src
          options:
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            members_order: source
  - bibtex:
      bib_file: bibliography.bib
      bib_by_default: false
      enable_inline_citations: false

hooks:
  - hooks/status_filter.py

not_in_nav: |
  /code_docs/index.md
  /code_docs/notebooks.md
  /knowledgebase/_templates/**

markdown_extensions:
  - admonition
  - footnotes:
      BACKLINK_TEXT: ""
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation and Usage: getting_started.md
      - Reactors: code_docs/reactors.md
      - Reactivities: code_docs/reactivities.md
      - Reactivity Plotter: code_docs/reactivity_plotter.md
      - Reactor Browser: code_docs/reactor_browser.ipynb
      - Reactor Playground: code_docs/reactor_playground.ipynb
      - Tau_E Solver: code_docs/tau_E_solver.ipynb
  - Knowledge Base:
      - Knowledge Base: knowledgebase/index.md
      - Physics Domains: physics_domains.md
      - Relation Interactions: relation_interactions.md
      - Workflow Playbooks: workflows.md
      - Cross Sections and Reactivities: "knowledgebase/Plasma Physics/cross_sections_reactivities.md"
  - Source Documentation:
      - Overview: code_docs/api/index.md
      - Core Modules: code_docs/api/core.md
      - Relation Modules: code_docs/api/relations.md
      - Registry and Utilities: code_docs/api/registry_and_utils.md
      - Reactor Class: code_docs/reactor_class.md
      - Relation Class: code_docs/relation_class.md
      - Variable Class: code_docs/variable_class.md
      - RelationSystem: code_docs/relationsystem_class.md
      - Relations and Variables: code_docs/relations_variables.md
      - Profile Integration: code_docs/profile_integration.md
      - Relation Graph Generator: code_docs/relation_graph_generator.ipynb
  - References:
      - Bibliography: bibliography.md
      - License Notes: LicenseNotes.md
