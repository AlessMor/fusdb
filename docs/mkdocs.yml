# to generate the site:
# pip install -e .[docs]
# mkdocs serve -f docs/mkdocs.yml
# Then open: http://127.0.0.1:8000


site_name: fusdb
site_description: Fusion reactor scenario database, physics relations, and solver documentation
site_url: https://alessmor.github.io/fusdb/
docs_dir: .
site_dir: ../site
repo_url: https://github.com/AlessMor/fusdb
repo_name: AlessMor/fusdb

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: amber

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - ../src
          options:
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            members_order: source

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Code Docs:
      - Overview: code_docs/index.md
      - User Guide:
          - Reactors: code_docs/reactors.md
          - Reactor Class: code_docs/reactor_class.md
          - Relations and Variables: code_docs/relations_variables.md
          - Relation Class: code_docs/relation_class.md
          - Variable Class: code_docs/variable_class.md
          - RelationSystem: code_docs/relationsystem_class.md
          - Profile Integration: code_docs/profile_integration.md
      - API Reference:
          - Overview: code_docs/api/index.md
          - Core Modules: code_docs/api/core.md
          - Relation Modules: code_docs/api/relations.md
          - Registry and Utilities: code_docs/api/registry_and_utils.md
      - Interactive:
          - Overview: code_docs/interactive/index.md
          - Reactor Playground: code_docs/interactive/reactor_playground.md
      - Notebooks: code_docs/notebooks.md
  - Knowledge Base:
      - Overview: knowledgebase/index.md
      - Physics Domains: knowledgebase/physics_domains.md
      - Relation Interactions: knowledgebase/relation_interactions.md
      - Workflow Playbooks: knowledgebase/workflows.md
      - Fusion Frontiers:
          - Overview: "knowledgebase/Fusion Frontiers/index.md"
      - Fusion Reactors:
          - Overview: "knowledgebase/Fusion Reactors/index.md"
      - Plasma Physics:
          - Overview: "knowledgebase/Plasma Physics/index.md"
      - Material:
          - Overview: "knowledgebase/Material/index.md"
      - Decommissioning for Fusion:
          - Overview: "knowledgebase/Decommissioning for Fusion/index.md"
      - Other Pages:
          - Overview: "knowledgebase/Other pages/index.md"
  - License Notes: LicenseNotes.md
