# to generate the site:
# pip install -e .[docs]
# mkdocs serve -f docs/mkdocs.yml
# Then open: http://127.0.0.1:8000


site_name: fusdb
site_description: Fusion reactor scenario database, physics relations, and solver documentation
site_url: https://alessmor.github.io/fusdb/
docs_dir: .
site_dir: ../site
repo_url: https://github.com/AlessMor/fusdb
repo_name: AlessMor/fusdb

exclude_docs: |
  /_private/
  /hooks/
  /scripts/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: amber

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/header_home.js
  - javascripts/home_hero.js
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/build_docs_assets.py
  - awesome-pages
  - mkdocs-jupyter:
      execute: false
      include_source: true
  - mkdocstrings:
      handlers:
        python:
          paths:
            - ../src
          options:
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            members_order: source
  - bibtex:
      bib_file: bibliography/bibliography.bib
      bib_by_default: false
      enable_inline_citations: false

hooks:
  - hooks/status_filter.py

not_in_nav: |
  /index.md
  /getting_started/examples/reactivity_plots.ipynb
  /knowledge_base/_templates/**

markdown_extensions:
  - admonition
  - footnotes:
      BACKLINK_TEXT: ""
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
